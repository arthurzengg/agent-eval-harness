name: eval

# Safe example workflow: installs the package and runs the example suite with the
# deterministic `echo` agent. It needs no secrets and makes no network calls.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          uv venv --clear
          uv pip install -e ".[dev]"

      - name: Lint
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests

      - name: Type-check
        run: uv run mypy

      - name: Test
        run: uv run pytest -q

  eval:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          uv venv --clear
          uv pip install -e ".[dev]"

      - name: Run example eval (echo agent, no secrets)
        run: |
          uv run agent-eval run \
            --suite examples/suites/refund_support.yaml \
            --agent echo \
            --trials 3 \
            --output reports/refund_support

      # To evaluate a real agent over HTTP instead, start a server that
      # implements POST /run and use the `http` adapter. The bundled mock agent
      # demonstrates the contract:
      #
      #   python examples/agents/mock_refund_agent.py &
      #   agent-eval run \
      #     --suite examples/suites/refund_support.yaml \
      #     --agent http --agent-url http://localhost:8080/run \
      #     --trials 3 --output reports/refund_support
      #
      # Keep any credentials in GitHub Secrets; this example needs none.

      - name: Gate against baseline
        # Fails the build when pass rate / pass@k / pass^k / avg score regress
        # beyond --tolerance. Regenerate the baseline with `make baseline`.
        run: |
          uv run agent-eval compare \
            --baseline baselines/refund_support.json \
            --current reports/refund_support/results.json \
            --tolerance 0.0

      - name: Upload reports (JSON + HTML)
        # Runs even if the gate failed, so a regression's artifacts are available.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: |
            reports/refund_support/results.json
            reports/refund_support/summary.json
            reports/refund_support/index.html
